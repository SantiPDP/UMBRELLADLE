<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Umbrelladle | Adivina el personaje de Resident Evil</title>

    <meta name="description" content="Umbrelladle es un juego diario inspirado en Wordle donde debes adivinar personajes de Resident Evil usando pistas sobre género, organización, rol y nacionalidad.">
    <meta name="keywords" content="Resident Evil, Wordle, Umbrelladle, juego Resident Evil, personajes Resident Evil">
    <meta name="author" content="Santiago D'Elía">
    <meta name="theme-color" content="#8b0000">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Umbrelladle">

    <!-- Open Graph -->
    <meta property="og:title" content="Umbrelladle | Adivina el personaje de Resident Evil">
    <meta property="og:description" content="¿Podés identificar al sujeto del día? Jugá el Wordle de Resident Evil.">
    <meta property="og:image" content="https://santipdp.github.io/UMBRELLADLE/imagenes/preview.jpg">
    <meta property="og:url" content="https://santipdp.github.io/UMBRELLADLE/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://santipdp.github.io/UMBRELLADLE/imagenes/preview.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" sizes="32x32" href="imagenes/favicon.png">
    <link rel="shortcut icon" href="imagenes/favicon.png">
    <link rel="apple-touch-icon" href="imagenes/favicon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PANTALLA DE CARGA -->
<div id="pantallaCarga">
    <div class="loader-contenido">
        <h1>UMBRELLA CORPORATION</h1>
        <div class="barra">
            <div class="progreso"></div>
        </div>
        <p>Inicializando sistema...</p>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="contenedor">

    <!-- Botón de idioma — arriba a la derecha -->
    <div style="text-align:right; margin-bottom: 8px;">
        <button id="botonIdioma" onclick="cambiarIdioma()">EN 🌐</button>
    </div>

    <h1 class="titulo">
        <span class="umbrella">UMBRELLA</span><span class="dle">DLE</span>
    </h1>

    <p class="subtitulo">☣️ IDENTIFICÁ AL SUJETO DEL DÍA ☣️</p>

    <div id="temporizador"></div>

    <!-- Labels con id para poder traducirlos -->
    <div id="estadisticas">
        <span><span id="lbl-partidas">Partidas:</span> <b id="partidas">0</b></span>
        |
        <span><span id="lbl-victorias">Victorias:</span> <b id="victorias">0</b></span>
        |
        <span><span id="lbl-racha">Racha:</span> <b id="racha">0</b></span>
        |
        <span><span id="lbl-mejor">Mejor:</span> <b id="mejor">-</b></span>
    </div>

    <div id="victoria"></div>
    <div id="tarjetaVictoria"></div>

    <!-- BARRA DE BÚSQUEDA -->
    <div class="barra-busqueda">
        <div class="busqueda-container">
            <input
                type="text"
                id="busqueda"
                placeholder="Nombre del personaje..."
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                inputmode="search"
            >
            <div id="sugerencias"></div>
        </div>
        <button id="botonAdivinar" onclick="adivinar()">ADIVINAR</button>
    </div>

    <!-- BOTONES EXTRAS -->
    <div class="botones-extra">
        <button id="botonHistorial" onclick="mostrarHistorial()">📖 Historial</button>
        <button id="botonCompartir" style="display:none;" onclick="compartirResultado()">📋 Compartir resultado</button>
    </div>

    <!-- PANEL HISTORIAL -->
    <div id="panelHistorial" style="display:none;">
        <div id="contenidoHistorial"></div>
    </div>

    <!-- TABLA -->
    <div class="tabla-wrapper">
        <table id="tabla">
            <thead>
                <tr>
                    <th>Personaje</th>
                    <th>Género</th>
                    <th>Primera aparición</th>
                    <th>Organización</th>
                    <th>Rol</th>
                    <th>Nacionalidad</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="personajes.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</body>
</html>
